# ==========================================================
# Stack local de desarrollo: Postgres 16 + API
# Uso: docker compose up -d
# ==========================================================
services:
  postgres:
    image: postgres:16-alpine
    container_name: finanzapp_pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: finanzapp
      POSTGRES_USER: finanzapp
      POSTGRES_PASSWORD: finanzapp_dev
    ports:
      - "5432:5432"
    volumes:
      - finanzapp_pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finanzapp -d finanzapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: finanzapp_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: development
      PORT: 4000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: finanzapp
      DB_USER: finanzapp
      DB_PASSWORD: finanzapp_dev
      JWT_ACCESS_SECRET: dev_access_secret_NEVER_USE_IN_PROD
      JWT_REFRESH_SECRET: dev_refresh_secret_NEVER_USE_IN_PROD
      CORS_ORIGINS: "http://localhost:5173,http://localhost:1420"
    ports:
      - "4000:4000"

volumes:
  finanzapp_pgdata:
