name: Deploy Backend API

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '!backend/node_modules/**'
      - '!backend/*.zip'
  workflow_dispatch:

jobs:
  deploy:
    name: Upload backend, install deps, trigger restart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: FTP upload backend
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          port: 21
          server-dir: finanzapp-api/
          local-dir: ./backend/
          dangerous-clean-slate: false
          exclude: |
            **/node_modules/**
            **/*.zip
            **/.git*
            **/coverage/**
            **/secrets/**

      # Si el repo tiene SSH_PRIVATE_KEY configurado, corre npm install + restart
      # via SSH. Si no, hace fallback al touch del restart.txt por FTP.
      - name: Run npm install on server (SSH)
        if: ${{ env.SSH_KEY != '' }}
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PORT: ${{ secrets.SSH_PORT || '22' }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/id_rsa -p "$SSH_PORT" -o StrictHostKeyChecking=no "$SSH_USER@$SSH_HOST" '
            set -e
            source /home/'"$SSH_USER"'/nodevenv/finanzapp-api/22/bin/activate || true
            cd ~/finanzapp-api
            echo "[deploy] npm install..."
            npm install --omit=dev --no-audit --no-fund --silent
            echo "[deploy] limpiando FIREBASE_SERVICE_ACCOUNT corrupto si quedo..."
            /home/'"$SSH_USER"'/nodevenv/finanzapp-api/22/bin/node -e "
              const fs=require(\"fs\");
              const p=\"/home/'"$SSH_USER"'/.cl.selector/node-selector.json\";
              try {
                const d=JSON.parse(fs.readFileSync(p));
                if(d[\"finanzapp-api\"]?.env_vars?.FIREBASE_SERVICE_ACCOUNT){
                  delete d[\"finanzapp-api\"].env_vars.FIREBASE_SERVICE_ACCOUNT;
                  d[\"finanzapp-api\"].env_vars.FIREBASE_SERVICE_ACCOUNT_FILE=\"/home/'"$SSH_USER"'/finanzapp-api/secrets/firebase.json\";
                  fs.writeFileSync(p,JSON.stringify(d,null,4));
                  console.log(\"[deploy] env var rota limpiada\");
                }
              } catch(e){console.log(\"[deploy] no se pudo limpiar config (puede ser normal): \"+e.message)}
            "
            echo "[deploy] reiniciando Passenger..."
            mkdir -p tmp
            touch tmp/restart.txt
            echo "[deploy] OK"
          '

      - name: Fallback - touch restart.txt via FTP
        if: ${{ env.SSH_KEY == '' }}
        env:
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          FTP_HOST: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
        run: |
          # Sin SSH solo podemos tocar restart.txt — el usuario tendra que correr
          # npm install manualmente en el servidor cuando cambien las deps
          sudo apt-get install -y lftp
          mkdir -p /tmp/restart-trigger
          touch /tmp/restart-trigger/restart.txt
          lftp -e "set ftp:ssl-allow yes; set ssl:verify-certificate no; \
            mkdir -p /finanzapp-api/tmp; \
            put /tmp/restart-trigger/restart.txt -o /finanzapp-api/tmp/restart.txt; \
            quit" -u "$FTP_USER","$FTP_PASS" "ftp://$FTP_HOST"
          echo "[deploy] WARNING: Sin SSH_PRIVATE_KEY configurado. Si agregaste deps nuevas al package.json, corre 'npm install' manualmente en el servidor."

      - name: Notify success
        run: echo "Backend desplegado en https://apifi.abbypixel.com"
