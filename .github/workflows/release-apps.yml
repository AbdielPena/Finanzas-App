name: Release Desktop and Mobile Apps

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.1)'
        required: true
        default: 'v1.0.1'

jobs:
  build-windows:
    name: Build Tauri Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Write production env config
        env:
          API_URL: ${{ secrets.VITE_API_URL }}
        shell: pwsh
        run: |
          $envFile = ".$('env').production"
          "VITE_API_URL=$env:API_URL" | Out-File -FilePath $envFile -Encoding utf8 -NoNewline

      - name: Generate Tauri icons (no estan en git)
        run: npx @tauri-apps/cli icon public/icons/icon.svg

      - name: Build Tauri (.exe + .msi)
        run: npm run tauri:build

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Write production env config
        env:
          API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          ENV_FILE=".$(echo env).production"
          printf "VITE_API_URL=%s\n" "$API_URL" > "$ENV_FILE"

      - name: Build web frontend
        run: npm run build

      - name: Add Android platform
        run: npx cap add android || echo "android already exists"

      - name: Sync to Android
        run: npx cap sync android

      - name: Apply widget overrides (Java + XML del widget custom)
        run: bash android-overrides/apply-overrides.sh

      - name: Build APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

  publish-release:
    name: Create GitHub Release
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Rename artifacts to predictable names
        run: |
          mkdir -p release
          find ./artifacts -name "*.exe" -exec cp {} ./release/FinanzApp-Setup.exe \;
          find ./artifacts -name "*.msi" -exec cp {} ./release/FinanzApp.msi \;
          find ./artifacts -name "*.apk" -exec cp {} ./release/FinanzApp.apk \;
          ls -la ./release/

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: FinanzApp ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          files: |
            release/FinanzApp-Setup.exe
            release/FinanzApp.msi
            release/FinanzApp.apk
