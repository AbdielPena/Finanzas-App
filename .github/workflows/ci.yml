name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - run: npm run build

  backend:
    name: Backend smoke test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: finanzapp_test
          POSTGRES_USER: finanzapp
          POSTGRES_PASSWORD: testpass
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install backend deps
        working-directory: backend
        run: npm install --no-audit --no-fund
      - name: Apply schema to test DB
        run: |
          PGPASSWORD=testpass psql -h localhost -U finanzapp -d finanzapp_test -f backend/db/schema.sql
      - name: Smoke test - server starts and health responds
        working-directory: backend
        env:
          NODE_ENV: test
          PORT: 4000
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: finanzapp_test
          DB_USER: finanzapp
          DB_PASSWORD: testpass
          JWT_ACCESS_SECRET: ci_test_access_secret
          JWT_REFRESH_SECRET: ci_test_refresh_secret
          CORS_ORIGINS: http://localhost:5173
        run: |
          node src/server.js &
          SERVER_PID=$!
          sleep 5
          curl -fsS http://localhost:4000/health || (echo "health failed"; kill $SERVER_PID; exit 1)
          curl -fsS http://localhost:4000/health/db || (echo "db check failed"; kill $SERVER_PID; exit 1)
          kill $SERVER_PID
          echo "✅ All checks passed"
